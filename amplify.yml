version: 1
frontend:
  phases:
    build:
      commands:
        # Install Lambda dependencies so they're available when you zip/deploy
        - cd lambda && npm ci --omit=dev && cd ..
  artifacts:
    baseDirectory: /
    files:
      - '**/*.html'
      - css/**/*
      - js/**/*
  cache:
    paths:
      - lambda/node_modules/**/*

